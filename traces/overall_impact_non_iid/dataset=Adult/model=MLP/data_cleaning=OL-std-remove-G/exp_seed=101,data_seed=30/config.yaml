data:
  cleaning:
    missing_values:
      name: default
    name: OL-std-remove-G
    outliers:
      correction_mode: remove
      detection_mode: std
      name: global
  dataset:
    dataset_name: Adult
    path: ./datasets/Adult/raw_data
    sensitive_attributes:
    - age
    - gender
    - race
  distribution:
    alpha: 0.01
    min_sample_per_class: 20
    name: label_dirichlet_skew
  loading:
    save_data_after_cleaning: false
    save_data_before_cleaning: false
    save_dir: ./datasets/Adult/static_data_loading
    static: false
  others:
    client_split: 0.2
    client_val_split: 0.5
    keep_test: false
    sampling_perc: 1.0
    server_split: 0.0
    server_test: false
    server_test_union: true
    server_val_split: 0.0
    uniform_test: false
  seed: 30
eval:
  eval_every: 1
  locals: false
  post_fit: false
  pre_fit: false
  server: true
  task: classification
exp:
  device: cpu
  inmemory: true
  seed: 101
  train: true
logger:
  json_log_dir: ${paths.output_dir}
  name: src.FL_core.utils.log.CustomLog
method:
  hyperparameters:
    client:
      batch_size: 128
      local_epochs: 10
      loss: BCEWithLogitsLoss
      optimizer:
        lr: 0.0001
        name: RMSprop
        weight_decay: 0.01
      scheduler:
        gamma: 1
        name: StepLR
        step_size: 1
    model: src.FL_core.utils.net.MLP
    net_args:
      input_size: 98
      n_hidden_layer_1: 64
      n_hidden_layer_2: 32
      num_classes: 1
    server:
      loss: BCEWithLogitsLoss
      time_to_accuracy_target: 0.8
      weighted: true
  name: src.FL_core.FL_algorithms.CustomCentralizedFL
paths:
  data_dir: ./datasets
  log_dir: ./logs
  output_dir: ${hydra:runtime.output_dir}
  root_dir: .
protocol:
  eligible_perc: 1.0
  n_clients: 10
  n_rounds: 150
save: {}
