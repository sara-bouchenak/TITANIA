data:
  cleaning:
    missing_values:
      name: default
    outliers:
      name: local
      detection_mode: std
      correction_mode: mode
  dataset:
    dataset_name: MEPS
    path: ./datasets/MEPS/raw_data/h181.ssp
    sensitive_attributes:
    - gender
    - race
    train_size: 0.8
  distribution:
    name: iid
  loading:
    save_data_after_cleaning: false
    save_data_before_cleaning: false
    save_dir: ./datasets/MEPS/static_data_loading
    static: false
  others:
    client_split: 0.2
    client_val_split: 0.0
    keep_test: false
    sampling_perc: 1.0
    server_split: 0.0
    server_test: false
    server_test_union: true
    server_val_split: 0.0
    uniform_test: false
  seed: 38
eval:
  eval_every: 1
  locals: false
  post_fit: false
  pre_fit: false
  server: true
  task: classification
exp:
  device: cpu
  inmemory: true
  seed: 303
  train: true
logger:
  json_log_dir: ${paths.output_dir} 
  name: src.FL_core.utils.log.CustomLog
method:
  hyperparameters:
    client:
      batch_size: 128
      local_epochs: 10
      loss: BCEWithLogitsLoss
      optimizer:
        lr: 0.001
        name: Adagrad
        weight_decay: 0.01
      scheduler:
        gamma: 1
        name: StepLR
        step_size: 1
    model: src.FL_core.utils.net.MLP
    net_args:
      input_size: 138
      n_hidden_layer_1: 64
      n_hidden_layer_2: 32
      num_classes: 1
    server:
      loss: BCEWithLogitsLoss
      time_to_accuracy_target: null
      weighted: true
  name: src.FL_core.FL_algorithms.CustomCentralizedFL
paths:
  data_dir: ./datasets
  log_dir: ./logs
  output_dir: ${hydra:runtime.output_dir} 
  root_dir: .
protocol:
  eligible_perc: 1.0
  n_clients: 10
  n_rounds: 150
save: {}
