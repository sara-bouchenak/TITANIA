data:
  cleaning:
    missing_values:
      name: local
      correction_mode: mode
    outliers:
      name: local
      detection_mode: std
      correction_mode: mode
    label_errors:
      detection_mode: cleanlab_split
      correction_mode: binary_flip
      name: local
    seed: 303
  dataset:
    dataset_name: Adult
    path: ./datasets/Adult/raw_data
    sensitive_attributes:
    - age
    - gender
    - race
  distribution:
    name: iid
  loading:
    save_data_after_cleaning: false
    save_data_before_cleaning: false
    save_dir: ./datasets/Adult/static_data_loading
    static: false
  noise_injection:
    label_errors_percentage: 0.4
    nan_percentage: 0.0
  others:
    client_split: 0.2
    client_val_split: 0.5
    keep_test: false
    sampling_perc: 1.0
    server_split: 0.0
    server_test: false
    server_test_union: true
    server_val_split: 0.0
    uniform_test: false
  seed: 59
eval:
  eval_every: 1
  locals: true
  post_fit: true
  pre_fit: true
  server: true
  task: classification
exp:
  device: cpu
  inmemory: true
  seed: 303
  train: true
logger:
  json_log_dir: ${paths.output_dir} 
  name: src.FL_core.utils.log.CustomLog
method:
  hyperparameters:
    client:
      batch_size: 128
      local_epochs: 10
      loss: BCELoss
      optimizer:
        lr: 0.0001
        name: AdamW
        weight_decay: 0
      scheduler:
        gamma: 1
        name: StepLR
        step_size: 1
    model: src.FL_core.utils.net.LogRegression
    net_args:
      input_size: 100
      num_classes: 1
    server:
      loss: BCELoss
      time_to_accuracy_target: null
      weighted: true
  name: src.FL_core.FL_algorithms.CustomCentralizedFL
paths:
  data_dir: ./datasets
  log_dir: ./logs
  output_dir: ${hydra:runtime.output_dir} 
  root_dir: .
protocol:
  eligible_perc: 1.0
  n_clients: 10
  n_rounds: 150
save: {}
