# @package _global_
defaults:
  - /experiment/bias_mitigation/default.yaml
  - /data/dataset/meps.yaml

data:
  seed: 38
method:

  hyperparameters:

    model: src.FL_core.utils.net.LogRegression

    client:

      loss: BCELoss

      optimizer:
        name: SGD
        lr: 0.001
        weight_decay: 0.01

      batch_size: 128
    
    server:
      time_to_accuracy_target: 0.8
      workers: 1