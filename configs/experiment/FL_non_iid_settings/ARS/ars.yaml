# @package _global_
defaults:
  - /experiment/FL_non_iid_settings/default.yaml
  - override /data/dataset: ars.yaml
  - override /data/others: union_clients_test_wo_val.yaml

method:

  hyperparameters:

    model: src.FL_core.utils.net.LogRegression

    client:

      loss: BCELoss

      optimizer:
        name: RMSprop
        lr: 0.01
        weight_decay: 0


    
    server:
      time_to_accuracy_target: 0.8
