# @package _global_
defaults:
  - /experiment/FL_non_iid_settings/default.yaml

method:

  hyperparameters:

    model: src.FL_core.utils.net.LogRegression

    client:

      loss: BCELoss

      optimizer:
        name: AdamW
        lr: 0.0001
        weight_decay: 0

      batch_size: 128
    
    server:
      time_to_accuracy_target: 0.8
